  <!-- Système de thèmes dynamique -->
  <script src="theme-manager.js"></script>
  
  <script>
    document.documentElement.classList.add('no-transition');
  
    async function updateThemeImages(themeKey) {
      const bottomImg = document.getElementById('bottom');
      const topLeftImg = document.getElementById('top-left');
      const topRightImg = document.getElementById('top-right');
    
      if (themeKey === 'default') {
        bottomImg.style.display = 'none';
        topLeftImg.style.display = 'none';
        topRightImg.style.display = 'none';
        bottomImg.src = '';
        topLeftImg.src = '';
        topRightImg.src = '';
        return;
      }
    
      const basePath = `assets/events/${themeKey}`;
      const config = window.themeSystem.getConfig();
      const theme = config?.themes?.[themeKey];
    
      // Appliquer les images
      bottomImg.src = `${basePath}/3.png`;
      topLeftImg.src = `${basePath}/2.png`;
      topRightImg.src = `${basePath}/1.png`;
    
      // Appliquer les tailles d'images depuis le JSON
      if (theme?.images) {
        // Image du bas
        if (theme.images.bottom) {
          Object.entries(theme.images.bottom).forEach(([prop, value]) => {
            bottomImg.style[prop] = value;
          });
        }
        
        // Image top-left
        if (theme.images.topLeft) {
          Object.entries(theme.images.topLeft).forEach(([prop, value]) => {
            topLeftImg.style[prop] = value;
          });
        }
        
        // Image top-right
        if (theme.images.topRight) {
          Object.entries(theme.images.topRight).forEach(([prop, value]) => {
            topRightImg.style[prop] = value;
          });
        }
      }
    
      bottomImg.style.display = 'block';
      topLeftImg.style.display = 'block';
      topRightImg.style.display = 'block';
    }

    setTimeout(() => {
      document.documentElement.classList.remove('no-transition');
    }, 125);
  
    (async () => {
      const currentTheme = await window.themeSystem.init();
      await updateThemeImages(currentTheme);
    })();
  </script>
</head>
<body>
  <div class="page">
    <div class="button-container">
      <button id="homeButton" class="install-button" title="Accueil / Déconnexion">
        <img src="assets/home.png" alt="Accueil" />
      </button>
    </div>

    <div id="mainContent">

      <h1>Ajouter vos Notes</h1>

      <form id="notesForm">
        <div class="subject-input">
          <label for="subject" id="labelSubject">Matière :</label><strong id="requiredSubject" class="required">&nbsp;*</strong>
          <select id="subject" required></select>
          <button type="button" id="modalBtn">Gérer les Matières</button>
        </div>
        <div class="marks-input">
          <label for="mark">Note obtenue :</label><strong class="required">&nbsp;*</strong>
          <input type="number" id="mark" step="0.01" placeholder="Note obtenue" required step="any" />
        </div>
        <div class="maxMarks-input">
          <label for="maxMark">Note maximale :</label><strong class="required">&nbsp;*</strong>
          <input type="number" id="maxMark" step="0.01" placeholder="Note maximale" required step="any" />
        </div>
        <div class="coefficient-input">
          <label for="coefficient">Coefficient :</label><strong class="required">&nbsp;*</strong>
          <input type="number" id="coefficient" step="0.01" placeholder="Coefficient" required />
        </div>
        <div id="specificOptions"></div>
        <div class="description-input">
          <label for="description">Description :</label>
          <input id="description" placeholder="Ajoutez une description à la note (facultatif)"></input>
        </div>
        <button type="submit">Ajouter la Note</button>
      </form>

      <div id="notesList" style="display: none;">
        <h2 id="notesTitle">Mes Notes :</h2>
        <ul id="notes"></ul>
      </div>
    </div>

    <div id="popUpDiv">
      <div id="myModal" class="modal" style="display: none;">
        <div class="modal-content">
          <span class="close">&times;</span>
          <h2 class="popUp">Gérer les Matières</h2>
          <div class="modal-body">
            <button class="btn" id="addSubjectBtn">Ajouter une matière</button>
    
            <label id="labelPopupDeleteSubject" for="subjectsToDelete">Supprimer une matière</label>
            <select id="subjectsToDelete">
            </select>
            <button class="btn" id="deleteSubjectBtn" style="display: none;">Supprimer la matière</button>
          </div>
        </div>
      </div>
    </div>

    <div id="editModal" class="modal" style="display: none;">
      <div class="modal-content">
        <span class="close" id="closeEditModal">&times;</span>
        <h2 class="popUp">Modifier la Note</h2>
        <form id="editNoteForm">
          <label for="editSubject">Matière :</label>
          <select id="editSubject"></select>

          <label for="editMark">Note obtenue :</label>
          <input type="number" step="0.01" id="editMark" required>

          <label for="editMaxMark">Note maximale :</label>
          <input type="number" step="0.01" id="editMaxMark" required>

          <label for="editCoefficient">Coefficient :</label>
          <input type="number" step="0.01" min="0.01" id="editCoefficient" required>

          <label for="editPeriode">Période :</label>
          <select id="editPeriode"></select>

          <label for="editDescription">Description :</label>
          <input id="editDescription"></input>

          <button type="submit">Enregistrer les modifications</button>
        </form>
      </div>
    </div>
  </div>

  <div class="images">
    <img id="bottom" class="theme-image bottom" alt="Image bas" style="display:none;" />
    <img id="top-left" class="theme-image top-left" alt="Image haut gauche" style="display:none;" />
    <img id="top-right" class="theme-image top-right" alt="Image haut droite" style="display:none;" />
  </div>

  <script src="firebase-config.js"></script>
  <script>
    let currentUser = null;
    let currentAccount = null;
    let subjects = [];
    let notes = [];
    let subjectDeleted = false;
    let editIndex = null;

    // Vérifier l'authentification au chargement
    onAuthStateChanged(async (user) => {
      if (user) {
        currentUser = user;
        const accountId = sessionStorage.getItem('currentAccountId');
        if (!accountId) {
          alert("Aucun compte sélectionné. Retour à l'accueil.");
          window.location.href = "index.html";
          return;
        }
        currentAccount = accountId;
        await loadAccountData();
      } else {
        alert("Vous devez être connecté pour accéder à cette page.");
        window.location.href = "index.html";
      }
    });

    async function loadAccountData() {
      const accountData = await getAccountData(currentAccount);
      if (accountData) {
        subjects = await getSubjects(currentAccount);
        notes = await getNotes(currentAccount);
        loadSubjects();
        updateNoteOptions();
        if (notes.length > 0) {
          updateNotes();
        }
      }
    }

    function updateNoteOptions() {
      const specificOptionsDiv = document.getElementById("specificOptions");
      specificOptionsDiv.innerHTML = "";

      getAccountData(currentAccount).then(accountData => {
        const typeDeCompte = accountData?.period;

        if (!typeDeCompte) {
          specificOptionsDiv.innerHTML = "<p style='color: red;'>Type de compte non défini</p>";
          return;
        }

        if (typeDeCompte === "trimestre" || typeDeCompte === "trimestriel") {
          specificOptionsDiv.innerHTML = `
            <label for="periode">Choisir le trimestre :</label><strong class="required">&nbsp;*</strong>
            <select id="periode">
              <option value="1">1er Trimestre</option>
              <option value="2">2ème Trimestre</option>
              <option value="3">3ème Trimestre</option>
            </select>
          `;
        } else if (typeDeCompte === "semestre" || typeDeCompte === "semestriel") {
          specificOptionsDiv.innerHTML = `
            <label for="periode">Choisir le semestre :</label><strong class="required">&nbsp;*</strong>
            <select id="periode">
              <option value="1">1er Semestre</option>
              <option value="2">2ème Semestre</option>
            </select>
          `;
        } else {
          specificOptionsDiv.innerHTML = "<p style='color: red;'>Type de compte invalide</p>";
        }
      });
    }
    
    async function logoutAndReturnHome() {
      await signOutUser();
      sessionStorage.removeItem('currentAccountId');
      window.location.href = 'index.html';
    }

    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('service-worker.js').then(function(registration) {
      }).catch(function(error) {
      });
    }

    let deferredPrompt;
    const installButton = document.getElementById("installButton");
    const homeButton = document.getElementById("homeButton");

    window.addEventListener("beforeinstallprompt", (e) => {
      e.preventDefault();
      deferredPrompt = e;
      if (installButton) {
        installButton.style.display = "block";
      }
      homeButton.style.display = "block";
      updateButtonPosition();
    });

    homeButton.addEventListener("click", logoutAndReturnHome);

    window.addEventListener("load", () => {
      const isStandalone =
        window.matchMedia("(display-mode: standalone)").matches ||
        window.navigator.standalone === true;

      if (isStandalone && installButton) {
        installButton.style.display = "none";
      }
      homeButton.style.display = "block";
      updateButtonPosition();
    });

    function updateButtonPosition() {
      const installBtn = document.getElementById("installButton");
      const homeBtn = document.getElementById("homeButton");
      const bothVisible = installBtn && installBtn.style.display === "block";

      if (bothVisible) {
        document.body.classList.add("buttons-visible");
      } else {
        document.body.classList.remove("buttons-visible");
      }
    }

    if (installButton) {
      installButton.addEventListener("click", () => {
        if (deferredPrompt) {
          deferredPrompt.prompt();
          deferredPrompt.userChoice.then((choiceResult) => {
            deferredPrompt = null;
          });
        }
      });
    }
    
    const subjectSelect = document.getElementById("subject");
    const subjectToDeleteSelect = document.getElementById("subjectsToDelete");
    const deleteSubjectSection = document.querySelector(".modal-body label");
    const subjectToDeleteContainer = document.querySelector(".modal-body select");
    const subjectToDeleteBtn = document.getElementById("deleteSubjectBtn");

    function loadSubjects() {
      subjectSelect.innerHTML = '';
      subjectToDeleteSelect.innerHTML = '';

      if (subjects.length === 0) {
        subjectSelect.style.display = 'none';
      } else {
        subjectSelect.style.display = 'inline-block';
        subjects.forEach(subject => {
          const option = document.createElement("option");
          option.value = subject;
          option.textContent = subject;
          subjectSelect.appendChild(option);
          const deleteOption = document.createElement("option");
          deleteOption.value = subject;
          deleteOption.textContent = subject;
          subjectToDeleteSelect.appendChild(deleteOption);
        });
      }
      
      if (subjects.length === 0) {
        deleteSubjectSection.style.display = 'none';
        subjectToDeleteContainer.style.display = 'none';
        subjectToDeleteBtn.style.display = 'none';
      } else {
        subjectToDeleteContainer.style.display = 'block';
        deleteSubjectSection.style.display = 'block';
        subjectToDeleteBtn.style.display = 'block';
        if (subjectDeleted) {
          subjectToDeleteContainer.style.display = 'block';
        }
      }
    }

    document.getElementById("addSubjectBtn").addEventListener("click", async () => {
      const newSubject = prompt("Entrez le nom de la nouvelle matière :");
      if (newSubject && !subjects.includes(newSubject)) {
        subjects.push(newSubject);
        await saveSubjects(currentAccount, subjects);
        subjectDeleted = false;
        loadSubjects();
      } else if (subjects.includes(newSubject)) {
        alert("Cette matière existe déjà. Veuillez entrer un nom différent.");
      }
    });

    document.getElementById("deleteSubjectBtn").addEventListener("click", async () => {
      const subjectToDelete = document.getElementById("subjectsToDelete").value;
      if (subjectToDelete) {
        const hasNotes = notes.some(note => note.subject === subjectToDelete);
        
        if (hasNotes) {
          const confirmDelete = confirm(`La suppression de cette matière supprimera toutes les notes associées. Êtes-vous sûr de vouloir continuer ?`);
          if (!confirmDelete) return;
        }

        const index = subjects.indexOf(subjectToDelete);
        if (index > -1) {
          subjects.splice(index, 1);
          notes = notes.filter(note => note.subject !== subjectToDelete);
          await saveSubjects(currentAccount, subjects);
          await saveNotes(currentAccount, notes);
          subjectDeleted = true;
          loadSubjects();
          updateNotes();
        }
      }
    });

    const modalBtn = document.getElementById("modalBtn");
    const modal = document.getElementById("myModal");
    const closeModal = document.getElementsByClassName("close")[0];

    modalBtn.onclick = () => modal.style.display = "flex";
    closeModal.onclick = () => modal.style.display = "none";

    document.getElementById("notesForm").addEventListener("submit", async (e) => {
      e.preventDefault();

      const subject = document.getElementById("subject").value;
      const mark = parseFloat(document.getElementById("mark").value);
      const maxMark = parseFloat(document.getElementById("maxMark").value);
      const coefficient = parseFloat(document.getElementById("coefficient").value);
      const description = document.getElementById("description").value.trim();
      const periodeSelect = document.getElementById("periode");

      if (isNaN(mark) || isNaN(maxMark) || isNaN(coefficient)) {
        alert("Veuillez remplir tous les champs correctement.");
        return;
      }

      const markOutOf20 = (mark / maxMark) * 20;
      const periode = periodeSelect ? periodeSelect.value : null;

      notes.push({ subject, mark, maxMark, coefficient, markOutOf20, description, periode });
      await saveNotes(currentAccount, notes);

      document.getElementById("notesForm").reset();
      updateNotes();
      updateNoteOptions();
    });
    
    function updateNotes() {
      const notesList = document.getElementById("notes");
      const notesTitle = document.getElementById("notesTitle");
    
      notesList.innerHTML = '';
    
      if (notes.length === 0) {
        notesTitle.style.display = 'none';
        document.getElementById("notesList").style.display = 'none'; 
      } else {
        notesTitle.style.display = 'block';
        document.getElementById("notesList").style.display = 'block'; 
    
        notes.forEach((note, index) => {
          const li = document.createElement("li");
          const markOutOf20Raw = (note.mark / note.maxMark) * 20;
    
          let decimals = 2;
          if (Number.isInteger(markOutOf20Raw)) {
            decimals = 0;
          } else {
            const decimalPartLength = markOutOf20Raw.toString().split(".")[1]?.length || 0;
            decimals = Math.min(decimalPartLength, 2);
          }
    
          const showConversion = (note.maxMark !== 20);
          const markOutOf20 = markOutOf20Raw.toFixed(decimals);
    
          let emoji = '';
          if (markOutOf20Raw < 4) emoji = '🔴';
          else if (markOutOf20Raw >= 4 && markOutOf20Raw <= 7) emoji = '🟠';
          else if (markOutOf20Raw > 7 && markOutOf20Raw <= 13) emoji = '🟡';
          else emoji = '🟢';
    
          li.innerHTML = `<span>${emoji} ${note.subject}</span><i class="coef">(Coef: ${note.coefficient})</i>`;
          li.innerHTML += `<div class="noteSur20">${note.mark}/${note.maxMark}`;
          if (showConversion) {
            li.innerHTML += ` soit ${markOutOf20}/20`;
          }
          li.innerHTML += `</div>`;
    
          if (note.description) {
            const desc = document.createElement("p");
            desc.textContent = `${note.description}`;
            li.appendChild(desc);
          }
    
          const buttonContainer = document.createElement("div");
          buttonContainer.classList.add("button-container-inline"); 
    
          const deleteButton = document.createElement("button");
          deleteButton.textContent = "Supprimer";
          deleteButton.classList.add("delete-button");
          deleteButton.onclick = () => deleteNote(index);
          
          const editButton = document.createElement("button");
          editButton.textContent = "Modifier";
          editButton.classList.add("edit-button");
          editButton.onclick = () => openEditModal(index);
    
          buttonContainer.appendChild(deleteButton);
          buttonContainer.appendChild(editButton);
    
          li.appendChild(buttonContainer);
          notesList.appendChild(li);
        });
      }
    }

    document.getElementById("closeEditModal").onclick = () => {
      document.getElementById("editModal").style.display = "none";
    };

    async function openEditModal(index) {
      const editPeriodeSelect = document.getElementById("editPeriode");
      editPeriodeSelect.innerHTML = "";
      const note = notes[index];
      editIndex = index;

      document.getElementById("editSubject").value = note.subject;
      document.getElementById("editMark").value = note.mark;
      document.getElementById("editMaxMark").value = note.maxMark;
      document.getElementById("editCoefficient").value = note.coefficient;
      document.getElementById("editDescription").value = note.description || "";

      const accountData = await getAccountData(currentAccount);
      const typeDeCompte = accountData?.period;

      const editSubjectSelect = document.getElementById("editSubject");
      editSubjectSelect.innerHTML = ''; 

      subjects.forEach(subject => {
        const option = document.createElement("option");
        option.value = subject;
        option.textContent = subject;
        if (subject === note.subject) {
          option.selected = true;
        }
        editSubjectSelect.appendChild(option);
      });

      document.getElementById("editModal").style.display = "flex";

      if (typeDeCompte === "trimestre" || typeDeCompte === "trimestriel") {
        editPeriodeSelect.innerHTML = `
          <option value="1">1er Trimestre</option>
          <option value="2">2ème Trimestre</option>
          <option value="3">3ème Trimestre</option>
        `;
      } else if (typeDeCompte === "semestre" || typeDeCompte === "semestriel") {
        editPeriodeSelect.innerHTML = `
          <option value="1">1er Semestre</option>
          <option value="2">2ème Semestre</option>
        `;
      }

      if (note.periode) {
        editPeriodeSelect.value = note.periode;
      }
      editPeriodeSelect.value = note.periode || 1;
    }

    document.getElementById("editNoteForm").addEventListener("submit", async (e) => {
      e.preventDefault();

      const editedNote = {
        subject: document.getElementById("editSubject").value,
        mark: parseFloat(document.getElementById("editMark").value),
        maxMark: parseFloat(document.getElementById("editMaxMark").value),
        coefficient: parseFloat(document.getElementById("editCoefficient").value),
        description: document.getElementById("editDescription").value,
        periode: document.getElementById("editPeriode").value,
      };

      editedNote.markOutOf20 = (editedNote.mark / editedNote.maxMark) * 20;

      notes[editIndex] = editedNote;
      await saveNotes(currentAccount, notes);
      document.getElementById("editModal").style.display = "none";
      updateNotes();
    });

    async function deleteNote(index) {
      notes.splice(index, 1);
      await saveNotes(currentAccount, notes);
      updateNotes(); 
    }
