<!DOCTYPE html>
<html lang="fr">
<head>
  <meta property="og:title" content="Sigma - Application de Gestion Scolaire" />
  <meta property="og:description" content="Bienvenue sur Sigma, l'application de gestion scolaire tout-en-un." />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://bryandrouet.github.io/Sigma/" />
  <meta property="og:image" content="https://raw.githubusercontent.com/BryanDrouet/Sigma/refs/heads/main/assets/icon.png" />
  <meta property="og:image:alt" content="Logo Sigma et gestion scolaire" />

  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Sigma - Application de Gestion Scolaire" />
  <meta name="twitter:description" content="Bienvenue sur Sigma, l'application de gestion scolaire tout-en-un." />
  <meta name="twitter:image" content="https://raw.githubusercontent.com/BryanDrouet/Sigma/refs/heads/main/assets/icon.png" />
  
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sigma - Connexion</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" type="image/png" href="assets/icon.png" />
  <link rel="stylesheet" href="styles/styleHome.css" />

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
</head>
<body>
  <div class="container">
    <div class="sigma-header">
      <img class="logo-sigma" src="assets/icon.png" alt="Logo Sigma" />
      <h1>Sigma</h1>
      <p class="tagline">Votre gestionnaire scolaire unifié</p>
    </div>
    
    <div id="authSection" class="auth-section">
      <!-- Section de connexion -->
      <div id="loginSection" class="auth-form">
        <h2>Connexion</h2>
        <input type="email" id="loginEmail" placeholder="Email" />
        <input type="password" id="loginPassword" placeholder="Mot de passe" />
        <button onclick="handleLogin()">Se connecter</button>
        <div class="divider">
          <span>OU</span>
        </div>
        <button class="google-btn" onclick="handleGoogleSignIn()">
          <svg width="18" height="18" viewBox="0 0 18 18" style="margin-right: 8px;">
            <path fill="#4285F4" d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.874 2.684-6.615z"/>
            <path fill="#34A853" d="M9 18c2.43 0 4.467-.806 5.956-2.184l-2.908-2.258c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332C2.438 15.983 5.482 18 9 18z"/>
            <path fill="#FBBC05" d="M3.964 10.707c-.18-.54-.282-1.117-.282-1.707s.102-1.167.282-1.707V4.961H.957C.347 6.175 0 7.55 0 9s.348 2.825.957 4.039l3.007-2.332z"/>
            <path fill="#EA4335" d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0 5.482 0 2.438 2.017.957 4.961L3.964 7.29C4.672 5.163 6.656 3.58 9 3.58z"/>
          </svg>
          Continuer avec Google
        </button>
        <p class="switch-auth">Pas encore de compte ? <a href="#" onclick="showSignup(); return false;">S'inscrire</a></p>
      </div>

      <!-- Section d'inscription -->
      <div id="signupSection" class="auth-form" style="display: none;">
        <h2>Inscription</h2>
        <input type="email" id="signupEmail" placeholder="Email" />
        <input type="password" id="signupPassword" placeholder="Mot de passe" />
        <input type="password" id="signupPasswordConfirm" placeholder="Confirmer le mot de passe" />
        <button onclick="handleSignup()">S'inscrire</button>
        <div class="divider">
          <span>OU</span>
        </div>
        <button class="google-btn" onclick="handleGoogleSignIn()">
          <svg width="18" height="18" viewBox="0 0 18 18" style="margin-right: 8px;">
            <path fill="#4285F4" d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.874 2.684-6.615z"/>
            <path fill="#34A853" d="M9 18c2.43 0 4.467-.806 5.956-2.184l-2.908-2.258c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332C2.438 15.983 5.482 18 9 18z"/>
            <path fill="#FBBC05" d="M3.964 10.707c-.18-.54-.282-1.117-.282-1.707s.102-1.167.282-1.707V4.961H.957C.347 6.175 0 7.55 0 9s.348 2.825.957 4.039l3.007-2.332z"/>
            <path fill="#EA4335" d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0 5.482 0 2.438 2.017.957 4.961L3.964 7.29C4.672 5.163 6.656 3.58 9 3.58z"/>
          </svg>
          Continuer avec Google
        </button>
        <p class="switch-auth">Déjà un compte ? <a href="#" onclick="showLogin(); return false;">Se connecter</a></p>
      </div>
    </div>
  </div>

  <button class="install-button" id="installButton">Installer l'application</button>
  <button id="showUpdatesButton">📝</button>

  <div id="updateModal" class="modal" style="display: none;">
    <div class="modal-content maj">
      <span class="close" onclick="closeUpdateModal()">&times;</span>
      <div id="updateContent" style="white-space: normal;"></div>
    </div>
  </div>

  <div id="accountModal" class="modal" style="display: none;">
    <div class="modal-content">
      <span class="close" onclick="closeModal()">&times;</span>
      <h2 class="popUp">Choisir un compte</h2>
      <p id="noAccount">Vous n'avez pas de compte enregistré.</p>
      <p id="labelLoginAccount" style="display: none;">Se connecter :</p>
      <div id="accountList"></div>
      <h3 id="createAccountH3">Créer un compte :</h3>
      <label for="newAccountName">Nom du compte</label>
      <input type="text" id="newAccountName" placeholder="Nouveau compte" />
      <label for="accountPeriod">Type de compte</label>
      <select id="accountPeriod">
        <option value="trimestriel">Trimestriel</option>
        <option value="semestriel">Semestriel</option>
      </select>
      <label for="accountYear">Année scolaire</label>
      <select id="accountYear"></select>
      <button id="createAccountBtn" onclick="createAccount()">Créer un compte</button>
    </div>
  </div>

  <div id="editAccountModal" class="modal" style="display: none;align-items: center;justify-content: center;">
    <div class="modal-content">
      <span class="close" onclick="closeEditModal()">&times;</span>
      <h2 class="popUp">Modifier le compte</h2>
      <label for="editAccountName">Nom du compte</label>
      <input type="text" id="editAccountName" placeholder="Nom du compte" />
      <label for="editAccountPeriod">Type de compte</label>
      <select id="editAccountPeriod">
        <option value="trimestriel">Trimestriel</option>
        <option value="semestriel">Semestriel</option>
      </select>
      <label for="editAccountYear">Année scolaire</label>
      <select id="editAccountYear"></select>
      <button id="editAccountBtn" onclick="saveEditedAccount()">Enregistrer</button>
    </div>
  </div>

  <script src="firebase-config.js"></script>
  <script src="firebase-config.js"></script>
  <script>
    let currentUser = null;
    let platformBeingEdited = '';
    let accountBeingEdited = '';

    // Vérifier si l'utilisateur est déjà connecté
    onAuthStateChanged(async (user) => {
      if (user) {
        currentUser = user;
        document.getElementById('authSection').style.display = 'none';
        openModal();
      }
    });

    // Fonctions d'authentification
    async function handleLogin() {
      const email = document.getElementById('loginEmail').value.trim();
      const password = document.getElementById('loginPassword').value;

      if (!email || !password) {
        alert("Veuillez remplir tous les champs.");
        return;
      }

      try {
        await signInUser(email, password);
        document.getElementById('authSection').style.display = 'none';
        openModal();
      } catch (error) {
        let errorMessage = "Erreur de connexion.";
        if (error.code === 'auth/user-not-found') {
          errorMessage = "Aucun compte trouvé avec cet email.";
        } else if (error.code === 'auth/wrong-password') {
          errorMessage = "Mot de passe incorrect.";
        } else if (error.code === 'auth/invalid-email') {
          errorMessage = "Email invalide.";
        }
        alert(errorMessage);
      }
    }

    async function handleSignup() {
      const email = document.getElementById('signupEmail').value.trim();
      const password = document.getElementById('signupPassword').value;
      const passwordConfirm = document.getElementById('signupPasswordConfirm').value;

      if (!email || !password || !passwordConfirm) {
        alert("Veuillez remplir tous les champs.");
        return;
      }

      if (password !== passwordConfirm) {
        alert("Les mots de passe ne correspondent pas.");
        return;
      }

      if (password.length < 6) {
        alert("Le mot de passe doit contenir au moins 6 caractères.");
        return;
      }

      try {
        await signUpUser(email, password);
        alert("Compte créé avec succès ! Vous pouvez maintenant créer vos comptes scolaires.");
        document.getElementById('authSection').style.display = 'none';
        openModal();
      } catch (error) {
        let errorMessage = "Erreur lors de l'inscription.";
        if (error.code === 'auth/email-already-in-use') {
          errorMessage = "Cet email est déjà utilisé.";
        } else if (error.code === 'auth/invalid-email') {
          errorMessage = "Email invalide.";
        } else if (error.code === 'auth/weak-password') {
          errorMessage = "Le mot de passe est trop faible.";
        }
        alert(errorMessage);
      }
    }

    function showSignup() {
      document.getElementById('loginSection').style.display = 'none';
      document.getElementById('signupSection').style.display = 'block';
    }

    function showLogin() {
      document.getElementById('signupSection').style.display = 'none';
      document.getElementById('loginSection').style.display = 'block';
    }

    // Connexion avec Google
    async function handleGoogleSignIn() {
      try {
        await signInWithGoogle();
        document.getElementById('authSection').style.display = 'none';
        openModal();
      } catch (error) {
        let errorMessage = "Erreur de connexion avec Google.";
        if (error.code === 'auth/popup-closed-by-user') {
          errorMessage = "Connexion annulée.";
        } else if (error.code === 'auth/popup-blocked') {
          errorMessage = "La popup a été bloquée par votre navigateur.";
        }
        alert(errorMessage);
      }
    }

    function generateSchoolYears() {
      const start = 2000;
      const end = 2025;
      const yearSelects = [document.getElementById("accountYear"), document.getElementById("editAccountYear")];
      yearSelects.forEach(select => {
        if (!select) return;
        select.innerHTML = "";
        for (let year = end; year >= start; year--) {
          const option = document.createElement("option");
          option.value = `${year}-${year + 1}`;
          option.textContent = `${year}-${year + 1}`;
          select.appendChild(option);
        }
      });
    }

    document.addEventListener("DOMContentLoaded", function() {
      generateSchoolYears();
      setupModalClickOutside();
    });

    document.getElementById("showUpdatesButton").addEventListener("click", () => {
      fetch("latestMaj.md")
        .then(response => {
          if (!response.ok) throw new Error("Fichier introuvable");
          return response.text();
        })
        .then(markdown => {
          const html = marked.parse(markdown);
          document.getElementById("updateContent").innerHTML = html;
          openModalWithAnimation('updateModal');
        })
        .catch(error => {
          document.getElementById("updateContent").innerHTML = "<p style='color:red;'>Erreur : impossible de charger les mises à jour.</p>";
          openModalWithAnimation('updateModal');
        });
    });

    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('service-worker.js').then(function(registration) {
      }).catch(function(error) {
      });
    }

    let deferredPrompt;
    const installButton = document.getElementById("installButton");

    window.addEventListener("beforeinstallprompt", (e) => {
      e.preventDefault();
      deferredPrompt = e;
      installButton.style.display = "block";
    });

    installButton.addEventListener("click", () => {
      if (deferredPrompt) {
        deferredPrompt.prompt();
        deferredPrompt.userChoice.then((choiceResult) => {
          deferredPrompt = null;
        });
      }
    });
    
    async function showAccountList() {
      const accountListDiv = document.getElementById('accountList');
      const labelLoginAccount = document.getElementById('labelLoginAccount');
      const noAccount = document.getElementById('noAccount');
      
      const accounts = await getAllAccounts();

      accountListDiv.innerHTML = ''; 
      labelLoginAccount.style.display = accounts.length > 0 ? "block" : "none";
      noAccount.style.display = accounts.length > 0 ? "none" : "block";

      accounts.forEach(account => {
        const accountItem = document.createElement('div');
        accountItem.classList.add('account-item');
        accountItem.style.display = 'flex';
        accountItem.style.alignItems = 'center';
        accountItem.style.justifyContent = 'space-between';
        accountItem.style.gap = '10px';

        const nameSpan = document.createElement('span');
        nameSpan.textContent = account.name || account.id;
        nameSpan.style.flex = '1';
        nameSpan.onclick = () => chooseAccount(account.id);

        const renameBtn = document.createElement('button');
        renameBtn.textContent = '✏️';
        renameBtn.title = 'Renommer';
        renameBtn.style.paddingLeft = '12px';
        renameBtn.style.paddingRight = '12px';
        renameBtn.onclick = (e) => {
          e.stopPropagation();
          renameAccount(account);
        };

        const deleteBtn = document.createElement('button');
        deleteBtn.textContent = '🗑️';
        deleteBtn.title = 'Supprimer';
        deleteBtn.style.paddingLeft = '12px';
        deleteBtn.style.paddingRight = '12px';
        deleteBtn.onclick = (e) => {
          e.stopPropagation();
          deleteAccount(account.id, account.name);
        };

        accountItem.appendChild(nameSpan);
        accountItem.appendChild(renameBtn);
        accountItem.appendChild(deleteBtn);
        accountListDiv.appendChild(accountItem);
      });
    }

    async function deleteAccount(accountId, accountName) {
      if (!confirm(`Supprimer le compte "${accountName}" ? Toutes ses données seront perdues.`)) return;

      await deleteAccountData(accountId);
      await showAccountList();
    }

    function renameAccount(account) {
      accountBeingEdited = account.id;

      document.getElementById('editAccountName').value = account.name || '';
      document.getElementById('editAccountPeriod').value = account.period || 'trimestriel';
      document.getElementById('editAccountYear').value = account.schoolYear || '';
      
      openModalWithAnimation('editAccountModal');
    }

    function closeUpdateModal() {
      closeModalWithAnimation('updateModal');
    }

    function closeEditModal() {
      closeModalWithAnimation('editAccountModal');
    }

    async function saveEditedAccount() {
      const newName = document.getElementById('editAccountName').value.trim();
      const newPeriod = document.getElementById('editAccountPeriod').value;
      const newYear = document.getElementById('editAccountYear').value;

      if (!newName) {
        alert("Le nom du compte ne peut pas être vide.");
        return;
      }

      await saveAccountData(accountBeingEdited, {
        name: newName,
        period: newPeriod,
        schoolYear: newYear
      });

      closeEditModal();
      await showAccountList();
    }
    
    function chooseAccount(accountId) {
      sessionStorage.setItem('currentAccountId', accountId);
      window.location.href = "dashboard.html";
    }
    
    async function createAccount() {
      const newAccountName = document.getElementById('newAccountName').value.trim();
      const period = document.getElementById('accountPeriod').value;
      const schoolYear = document.getElementById('accountYear').value;

      if (!newAccountName) {
        alert("Veuillez entrer un nom pour le compte.");
        return;
      }

      const accountId = `account_${Date.now()}`;
      await saveAccountData(accountId, {
        name: newAccountName,
        period: period,
        schoolYear: schoolYear
      });
 
      chooseAccount(accountId);
    }

    function openModalWithAnimation(modalId, callback) {
      const modal = document.getElementById(modalId);
      
      modal.style.display = 'flex';
      modal.classList.add('modal-opening');
      
      setTimeout(() => {
        modal.classList.remove('modal-opening');
        if (callback) callback();
      }, 300);
    }

    function closeModalWithAnimation(modalId, callback) {
      const modal = document.getElementById(modalId);
      
      modal.classList.add('modal-closing');
      
      setTimeout(() => {
        modal.style.display = 'none';
        modal.classList.remove('modal-closing');
        if (callback) callback();
      }, 300);
    }

    function setupModalClickOutside() {
      const modals = ['accountModal', 'editAccountModal', 'updateModal'];
      
      modals.forEach(modalId => {
        const modal = document.getElementById(modalId);
        if (modal) {
          modal.addEventListener('click', (e) => {
            if (e.target === modal) {
              if (modalId === 'accountModal') {
                closeModal();
              } else if (modalId === 'editAccountModal') {
                closeEditModal();
              } else if (modalId === 'updateModal') {
                closeUpdateModal();
              }
            }
          });
        }
      });
    }
    
    async function openModal() {
      const modal = document.getElementById('accountModal');
      const title = document.querySelector('#accountModal .popUp');
      
      title.textContent = "Choisir un compte Sigma";
      await showAccountList();
      
      modal.style.display = 'flex';
      modal.classList.add('modal-opening');
      
      setTimeout(() => {
        modal.classList.remove('modal-opening');
      }, 300);
    }
    
    function closeModal() {
      closeModalWithAnimation('accountModal');
    }
